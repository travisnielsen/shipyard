name: dev-workspace
type: Microsoft.App/containerApps
properties:
  managedEnvironmentId: /subscriptions/<sub>/resourceGroups/<rg>/providers/Microsoft.App/managedEnvironments/<env>
  configuration:
    ingress:
      external: false
      targetPort: 8443
      transport: auto
    secrets:
      - name: devcontainer-password
        value: <replace-me>
  template:
    containers:
      - name: dev-workspace
        image: myacr.azurecr.io/remote-devcontainer:latest
        env:
          - name: DEVCONTAINER_PASSWORD
            secretRef: devcontainer-password
          - name: DEVCONTAINER_PORT
            value: "8443"
        resources:
          cpu: 1.0
          memory: 2Gi
    scale:
      minReplicas: 1
      maxReplicas: 3
