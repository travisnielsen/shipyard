apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-workspace
  labels:
    app: dev-workspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-workspace
  template:
    metadata:
      labels:
        app: dev-workspace
    spec:
      containers:
        - name: dev-workspace
          image: myacr.azurecr.io/remote-devcontainer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          env:
            - name: DEVCONTAINER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-workspace-secrets
                  key: password
            - name: DEVCONTAINER_PORT
              value: "8443"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
