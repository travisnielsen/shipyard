name: devcontainer-image-cd
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - devcontainer/**
  pull_request:
    paths:
      - devcontainer/**

permissions:
  id-token: write
  contents: read

concurrency:
  group: devcontainer-image-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build devcontainer image
        run: |
          set -euo pipefail
          docker build -f ./devcontainer/Dockerfile -t remote-devcontainer:ci ./devcontainer

      - name: Run tool version smoke tests
        timeout-minutes: 8
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /usr/local/bin/tool-version-smoke-test.sh remote-devcontainer:ci

  build-and-push:
    needs: ci-build-and-smoke
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on:
      - shipyard-runner-set
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      IMAGE_NAME: remote-devcontainer
      ACR_RESOURCE_GROUP: ${{ vars.ACR_RESOURCE_GROUP || '' }}
      ACR_TASK_AGENTPOOL_NAME: arcbuild
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          set -euo pipefail
          test -n "${{ vars.AZURE_CLIENT_ID }}"
          test -n "${{ vars.AZURE_TENANT_ID }}"
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          test -n "${{ vars.ACR_LOGIN_SERVER }}"
          test -n "${{ vars.ACR_RESOURCE_GROUP || '' }}"
          test -n "$ACR_TASK_AGENTPOOL_NAME"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Extract ACR name
        run: |
          set -euo pipefail
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

      - name: Build image with ACR Tasks
        run: |
          set -euo pipefail
          az acr build --registry "$ACR_NAME" --resource-group "$ACR_RESOURCE_GROUP" --agent-pool "$ACR_TASK_AGENTPOOL_NAME" --image "${IMAGE_NAME}:latest" --file ./devcontainer/Dockerfile ./devcontainer

      - name: Publish metadata
        run: |
          echo "image=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest" >> "$GITHUB_STEP_SUMMARY"
