name: devcontainer-image-cd
on:
  push:
    paths:
      - devcontainer/**
  pull_request:
    paths:
      - devcontainer/**

permissions:
  id-token: write
  contents: read

concurrency:
  group: devcontainer-image-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on:
      - self-hosted
      - linux
      - shipyard-private
      - aks
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      IMAGE_NAME: remote-devcontainer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          set -euo pipefail
          test -n "${{ vars.AZURE_CLIENT_ID }}"
          test -n "${{ vars.AZURE_TENANT_ID }}"
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          test -n "${{ vars.ACR_LOGIN_SERVER }}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR docker login
        run: |
          set -euo pipefail
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          az acr login --name "$ACR_NAME"

      - name: Build image
        run: |
          set -euo pipefail
          docker build -t "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" ./devcontainer

      - name: Tag branch-sha
        if: github.ref_type == 'branch'
        run: |
          set -euo pipefail
          SAFE_BRANCH="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"
          docker tag "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SAFE_BRANCH}-${GITHUB_SHA}"

      - name: Push image sha
        run: |
          set -euo pipefail
          docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Push branch-sha tag
        if: github.ref_type == 'branch'
        run: |
          set -euo pipefail
          SAFE_BRANCH="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"
          docker push "${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${SAFE_BRANCH}-${GITHUB_SHA}"

      - name: Publish metadata
        run: |
          echo "image=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
