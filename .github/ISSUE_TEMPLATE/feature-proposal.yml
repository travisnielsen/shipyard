name: Feature Proposal
description: Propose a feature and link it to a technical spec.
title: "feat: <short feature title>"
labels:
  - feature
  - needs-spec
body:
  - type: markdown
    attributes:
      value: |
        Create a spec in `specs/features/` before implementation.
  - type: input
    id: problem
    attributes:
      label: Problem Statement
      description: What user or platform problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the feature at a high level.
    validations:
      required: true
  - type: textarea
    id: security-considerations
    attributes:
      label: Security and Compliance Considerations
      description: Include network, identity, and data concerns.
  - type: input
    id: spec-link
    attributes:
      label: Spec Link
      description: Link to `specs/features/<feature>.md`.
      placeholder: specs/features/example-feature.md
    validations:
      required: true
